<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MMLisp authoring environment</title>
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <!-- CodeMirror 6 -->
  <link rel="stylesheet" href="https://unpkg.com/@codemirror/view@6/dist/index.css">
  <style>
    /* ---- color tokens ----
       3 bases + error; mid/high are derived from foreground so changing
       --foreground retints the whole UI. --contrast is the emphasis pole
       (white on dark themes, black on light themes); applyTheme() sets it
       automatically from the background's luminance. */
    :root {
      --background: #000;
      --foreground: #7df;
      --accent:     #6c9;
      --error:      #e66;
      --contrast:   #fff;
      --mid:  color-mix(in srgb, var(--foreground) 40%, var(--background));   /* toned down */
      --high: color-mix(in srgb, var(--foreground) 45%, var(--contrast));     /* emphasis */
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; overflow: hidden; }
    body {
      background: var(--background);
      color: var(--foreground);
      font-family: 'Open Sans', sans-serif;
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    /* ---- top bar ---- */
    #topbar {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0 0.5rem;
      height: 36px;
      flex-shrink: 0;
      background: var(--background);
      border-bottom: 1px solid var(--mid);
    }
    #topbar select,
    .tb-btn,
    .kbd-btn,
    .menu-btn,
    .menu-item,
    .ms-btn {
      font-family: inherit;
      border-radius: 2px;
      cursor: pointer;
    }
    #topbar select,
    .tb-btn,
    .kbd-btn,
    .menu-btn,
    .menu-item,
    .menu-item-shortcut {
      font-size: 0.72rem;
    }
    #topbar select {
      background: var(--background);
      border: 1px solid var(--mid);
      color: var(--foreground);
      padding: 0.2rem 0.4rem;
    }
    #topbar select:hover { border-color: var(--high); color: var(--high); }
    .tb-btn,
    .kbd-btn {
      background: var(--background);
      border: 1px solid var(--mid);
      color: var(--foreground);
      white-space: nowrap;
      padding: 0.15rem 0.5rem;
    }
    @media (hover: hover) { .tb-btn:hover { border-color: var(--high); color: var(--high); } }
    .tb-btn:disabled { opacity: 0.3; cursor: default; }
    .tb-btn.active { border-color: var(--foreground); color: var(--background); background: var(--foreground); }
    #topbar .spacer { flex: 1; }
    #btnPanel {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      padding: 0 0.4rem;
    }
    #btnPanel svg {
      width: 0.95rem;
      height: 0.95rem;
      display: block;
      fill: currentColor;
      pointer-events: none;
    }

    /* ---- menu dropdowns ---- */
    .menu-wrap { position: relative; }
    /* Stretch top-level menu buttons to the full bar height so the dropdown,
       anchored at 100%, opens flush with the top bar's bottom border. */
    #topbar > .menu-wrap {
      align-self: stretch;
      display: flex;
      align-items: center;
    }
    .menu-btn {
      background: transparent;
      border: none;
      color: var(--foreground);
      padding: 0.2rem 0.5rem;
      white-space: nowrap;
    }
    @media (hover: hover) { .menu-btn:hover { color: var(--high); } }
    .menu-wrap.open .menu-btn { color: var(--high); }
    .menu-dropdown {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      background: var(--background);
      border: 1px solid var(--mid);
      border-radius: 2px;
      z-index: 100;
      min-width: 200px;
    }
    .menu-wrap.open > .menu-dropdown { display: block; }
    .menu-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      width: 100%;
      padding: 0.35rem 0.75rem;
      background: none;
      border: none;
      color: var(--foreground);
      text-align: left;
      white-space: nowrap;
    }
    .menu-item-shortcut {
      color: var(--mid);
    }
    .submenu-wrap {
      position: relative;
    }
    .submenu-dropdown {
      left: 100%;
      top: 0;
      margin-left: 4px;
    }
    .submenu-arrow {
      width: 0.38rem;
      height: 0.38rem;
      border: solid currentColor;
      border-width: 0 1.5px 1.5px 0;
      transform: rotate(-45deg);
      color: var(--mid);
      flex-shrink: 0;
      pointer-events: none;
    }
    @media (hover: hover) { .menu-item:hover { background: color-mix(in srgb, var(--foreground) 14%, var(--background)); color: var(--high); } }
    @media (hover: hover) { .menu-item:hover .menu-item-shortcut { color: var(--high); } }
    @media (hover: hover) { .menu-item:hover .submenu-arrow { color: var(--high); } }

    /* ---- main area ---- */
    #main {
      display: flex;
      flex: 1;
      min-height: 0;
      overflow: hidden;
      position: relative;
      --panel-width: 400px;
    }

    /* ---- left column: editor + console ---- */
    #leftCol {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
    }
    #editorWrap {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      border-bottom: none;
    }
    #editorWrap .cm-editor {
      height: 100%;
      font-size: 0.82rem;
      background: var(--background);
    }
    /* iOS Safari zooms focused editable content when effective size is < 16px. */
    @media (hover: none) and (pointer: coarse), (max-width: 768px) {
      #editorWrap .cm-editor,
      #editorWrap .cm-content,
      #editorWrap .cm-line,
      #editorWrap .cm-gutter,
      #editorWrap .cm-gutterElement {
        font-size: 16px !important;
      }
    }
    #editorWrap .cm-scroller { overflow: auto; }
    #editorWrap .cm-content { color: var(--foreground); }
    #editorWrap .cm-activeLine { background: transparent; }
    #editorWrap .cm-gutters {
      background: var(--background);
      border-right: none;
      color: var(--mid);
    }
    /* Per-track playhead cursors — outline the sounding token (no fill) */
    .cm-playTok-0, .cm-playTok-1, .cm-playTok-2, .cm-playTok-3 {
      border-radius: 2px;
      box-shadow: 0 0 0 1px var(--foreground);
    }
    /* Active step sequence ([...]) — outline the whole literal while it sounds */
    .cm-playSeq {
      border-radius: 2px;
      box-shadow: inset 0 0 0 1px var(--foreground);
    }

    /* drag divider */
    #hDivider {
      height: 4px;
      background: var(--background);
      border-top: 1px solid var(--mid);
      border-bottom: 1px solid var(--mid);
      cursor: row-resize;
      flex-shrink: 0;
    }
    #hDivider:hover { background: var(--mid); }

    /* console */
    #consolePane {
      height: 100px;
      min-height: 40px;
      max-height: 60vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      border-top: none;
    }
    #log {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 0.4rem 0.6rem;
      font-size: 0.72rem;
      color: var(--foreground);
      line-height: 1.5;
      background: var(--background);
    }
    #log .err { color: var(--error); }
    #log .info { color: var(--foreground); }

    /* ---- right panel ---- */
    #rightPanel {
      position: relative;
      width: var(--panel-width);
      flex: 0 0 var(--panel-width);
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: var(--background);
      border-left: 1px solid var(--mid);
      overflow: hidden;
      transform: translateX(0);
      transition: transform 0.18s ease, border-color 0.18s ease;
    }
    #rightPanel,
    #rightPanel * {
      -webkit-user-select: none;
      user-select: none;
    }
    #rightPanelBody {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      overscroll-behavior: contain;
    }
    @media (max-width: 480px) {
      #main { flex-direction: column; }
      #consolePane {
        height: 70px;
      }
      #rightPanel {
        position: absolute;
        right: 0;
        top: 0;
        bottom: 0;
        z-index: 5;
        width: 100%;
        flex-basis: auto;
        left: 0;
        border-left: none;
        transform: translateX(0);
        transition: transform 0.18s ease, border-color 0.18s ease;
      }
    }
    #rightPanel.collapsed {
      margin-right: calc(var(--panel-width) * -1);
      transform: translateX(100%);
      border-left-color: transparent;
      pointer-events: none;
      overflow: hidden;
    }
    @media (max-width: 480px) {
      #rightPanel.collapsed {
        margin-right: 0;
        width: 100%;
        flex-basis: auto;
        transform: translateX(100%);
      }
    }

    .rack-section {
      padding: 0.75rem;
    }
    .rack-title {
      font-size: 0.72rem;
      font-weight: bold;
      color: var(--foreground);
      margin-bottom: 0.5rem;
      cursor: pointer;
      user-select: none;
    }
    .rack-title::before {
      content: '';
      display: inline-block;
      width: 0;
      height: 0;
      border-left: 4px solid currentColor;
      border-top: 3px solid transparent;
      border-bottom: 3px solid transparent;
      margin-right: 0.4rem;
      vertical-align: middle;
      transform: rotate(90deg);
      transition: transform 0.12s;
    }
    .rack-section.collapsed .rack-title::before { transform: rotate(0deg); }
    .rack-section.collapsed .rack-title { margin-bottom: 0; }
    .rack-section.collapsed .rack-body { display: none; }
    .rack-title-row {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .rack-title-row::before { margin-right: 0; }
    #fmParamStatus {
      margin-left: auto;
      color: var(--mid);
      font-size: 0.58rem;
      font-weight: normal;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ---- knobs / sliders (right panel) ---- */
    .param-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 0.5rem;
    }
    .knob-wrap { display: flex; flex-direction: column; gap: 0.3rem; margin-bottom: 0.5rem; }
    .knob-wrap:last-child { margin-bottom: 0; }
    .knob-label {
      font-size: 0.58rem;
      color: var(--mid);
      display: flex;
      justify-content: space-between;
    }
    .knob-label span.val { color: var(--foreground); }
    input[type=range] {
      appearance: none;
      -webkit-appearance: none;
      width: 100%;
      height: 14px;
      background: var(--background);
      border: 1px solid var(--mid);
      border-radius: 7px;
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 11px; height: 11px;
      border-radius: 50%;
      background: var(--foreground);
      border: none;
    }
    input[type=range]::-moz-range-thumb {
      width: 11px; height: 11px;
      border-radius: 50%;
      background: var(--foreground);
      border: none;
    }
    input[type=range]:hover { border-color: var(--high); }

    .op-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.5rem;
    }
    .op-col-title {
      font-size: 0.58rem;
      color: var(--mid);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.4rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .op-col-title input[type=checkbox] {
      appearance: none;
      -webkit-appearance: none;
      width: 0.8rem;
      height: 0.8rem;
      margin: 0;
      padding: 0;
      cursor: pointer;
      flex-shrink: 0;
      box-sizing: border-box;
      position: relative;
      background: var(--background);
      border: 1px solid var(--mid);
      border-radius: 2px;
    }
    .op-col-title input[type=checkbox]:hover { border-color: var(--high); }
    .op-col-title input[type=checkbox]:focus-visible {
      outline: 1px solid var(--high);
      outline-offset: 1px;
    }
    .op-col-title input[type=checkbox]:checked::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 50%;
      width: 1.5px;
      height: 140%; /* box diagonal (√2) — spans corner to corner */
      background: var(--background);
      transform: translate(-50%, -50%) rotate(45deg);
    }
    /* Carrier / modulator roles — default is modulator */
    .op-col { --op-color: var(--accent); }
    .op-col.carrier { --op-color: var(--foreground); }
    .op-col .op-col-title { color: var(--op-color); }
    .op-col .op-col-title input[type=checkbox]:checked {
      background: var(--op-color);
      border-color: var(--op-color);
    }
    .op-col input[type=range]::-webkit-slider-thumb { background: var(--op-color); }
    .op-col input[type=range]::-moz-range-thumb { background: var(--op-color); }
    .op-col .knob-label span.val { color: var(--op-color); }
    #algDisplay {
      font-size: 0.58rem;
      color: var(--mid);
      min-height: 1.2em;
      margin: 0.2rem 0;
    }
    .op-grid { margin-top: 0.3rem; }
    .param-grid { margin-bottom: 0.3rem; }

    /* FM panel disabled state */
    #fmParamSection.fm-disabled .knob-label,
    #fmParamSection.fm-disabled .op-col-title,
    #fmParamSection.fm-disabled #algDisplay {
      color: var(--mid);
    }
    #fmParamSection.fm-disabled .knob-label .val,
    #fmParamSection.fm-disabled .op-col .knob-label .val {
      color: var(--mid);
    }
    #fmParamSection.fm-disabled input[type=range] {
      background: var(--background);
      border-color: var(--mid);
      cursor: not-allowed;
      opacity: 0.6;
    }
    #fmParamSection.fm-disabled input[type=range]::-webkit-slider-thumb {
      background: var(--mid);
    }
    #fmParamSection.fm-disabled input[type=range]::-moz-range-thumb {
      background: var(--mid);
    }
    #fmParamSection.fm-disabled input[type=checkbox] {
      cursor: not-allowed;
      opacity: 0.55;
    }
    #fmParamSection.fm-disabled .op-col-title input[type=checkbox]:checked {
      background: var(--mid);
      border-color: var(--mid);
    }

    /* channel strips */
    .ch-strips-row {
      display: flex;
      gap: 0.3rem;
      overflow-x: auto;
      padding-bottom: 4px;
    }
    .ch-col {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      align-items: stretch;
      flex: 0 0 auto;
      min-width: 2rem;
    }
    .ms-btn {
      background: var(--background);
      border: 1px solid var(--mid);
      color: var(--mid);
      font-size: 0.58rem;
      width: 100%;
      text-align: center;
    }
    .ms-btn:hover { border-color: var(--high); color: var(--high); }
    .ms-btn.muted  { background: var(--background); border-color: var(--error); color: var(--error); }
    .ms-btn.soloed { background: var(--background); border-color: var(--accent); color: var(--accent); }
    .ms-btn.ch-sel { background: var(--background); border-color: var(--foreground); color: var(--foreground); }
    .ms-btn:disabled { opacity: 0.25; cursor: default; }
    .ch-section-label {
      font-size: 0.58rem;
      color: var(--mid);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0.4rem 0 0.2rem;
    }

    /* bottom keyboard */
    #keyboardDock {
      border-top: none;
      background: var(--background);
      padding: 0.55rem;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      flex-shrink: 0;
      border-radius: 8px;
      overflow: hidden;
    }
    #keyboardDock,
    #keyboardDock * {
      -webkit-user-select: none;
      user-select: none;
    }
    #keyboardControls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      overflow-x: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--mid) transparent;
      padding-bottom: 0.1rem;
    }
    .kbd-group {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      min-width: 0;
    }
    .kbd-group.kbd-oct {
      margin-left: auto;
      flex-shrink: 0;
    }
    .kbd-btn {
      line-height: normal;
      height: auto;
      min-width: auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .kbd-btn[hidden] { display: none; }
    .kbd-btn svg {
      width: 0.8rem;
      height: 0.8rem;
      display: block;
      pointer-events: none;
      fill: currentColor;
    }
    .kbd-btn:hover { border-color: var(--high); color: var(--high); }
    .kbd-btn.active {
      background: var(--foreground);
      color: var(--background);
    }
    #kbKeys {
      position: relative;
      height: 4rem;
      user-select: none;
      touch-action: none;
      overflow: hidden;
      border: none;
      border-radius: 2px;
      background: var(--background);
    }
    .kb-white-row {
      display: grid;
      grid-template-columns: repeat(14, minmax(0, 1fr));
      gap: 2px;
      height: 100%;
      background: var(--background);
    }
    .kb-black-row {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 60%;
      pointer-events: none;
    }
    .kb-key {
      border: none;
      border-radius: 0 0 2px 2px;
      background: var(--foreground);
      color: var(--background);
      font-size: 0.58rem;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 0.3rem;
      cursor: pointer;
      position: relative;
      outline: none;
    }
    .kb-oct-marker {
      font-size: 0.58rem;
      color: var(--mid);
      line-height: 1;
      pointer-events: none;
    }
    .kb-key.black {
      position: absolute;
      top: 0;
      background: var(--background);
      color: var(--foreground);
      height: 100%;
      width: calc((100% / 14) - 2px);
      transform: translateX(-50%);
      z-index: 1;
      pointer-events: auto;
      justify-content: center;
      padding-bottom: 0.15rem;
    }
    .kb-key.down {
      box-shadow: inset 0 0 0 2px var(--foreground);
      background: var(--high);
      color: var(--background);
    }
    .kb-key.black.down {
      box-shadow: inset 0 0 0 2px var(--high);
      background: var(--foreground);
      color: var(--background);
    }
    #keyboardDock.kb-disabled .kbd-btn,
    #keyboardDock.kb-disabled .kb-key {
      opacity: 0.25;
      cursor: not-allowed;
    }

    /* ---- modal (custom theme editor) ---- */
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.5);
    }
    .modal-overlay[hidden] { display: none; }
    .modal {
      background: var(--background);
      border: 1px solid var(--foreground);
      border-radius: 4px;
      padding: 1rem 1.25rem;
      min-width: 260px;
    }
    .modal-title {
      color: var(--foreground);
      font-size: 0.78rem;
      font-weight: bold;
      margin-bottom: 0.75rem;
    }
    .theme-fields {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .theme-field {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .theme-field label {
      flex: 1;
      color: var(--foreground);
      font-size: 0.72rem;
    }
    .theme-field input[type=color] {
      width: 1.5rem;
      height: 1.5rem;
      padding: 0;
      border: 1px solid var(--mid);
      border-radius: 2px;
      background: none;
      cursor: pointer;
    }
    .theme-field input[type=text] {
      width: 5.5rem;
      background: var(--background);
      border: 1px solid var(--mid);
      color: var(--foreground);
      border-radius: 2px;
      padding: 0.15rem 0.4rem;
      font-family: inherit;
      font-size: 0.72rem;
    }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.5rem;
      margin-top: 1rem;
    }

  </style>
</head>
<body>

  <!-- Top bar -->
  <div id="topbar">
    <!-- File menu -->
    <div class="menu-wrap" id="menuFile">
      <button class="menu-btn" onclick="toggleMenu('menuFile')">File</button>
      <div class="menu-dropdown">
        <button class="menu-item" onclick="newFile();closeMenus()">
          <span>New</span>
          <span class="menu-item-shortcut" id="newFileShortcut"></span>
        </button>
        <button class="menu-item" onclick="openFile();closeMenus()">
          <span>Open…</span>
          <span class="menu-item-shortcut" id="openFileShortcut"></span>
        </button>
        <div class="menu-wrap submenu-wrap" id="menuImport">
          <button class="menu-item" onclick="toggleSubmenu('menuImport')">
            <span>Import</span>
            <span class="submenu-arrow" aria-hidden="true"></span>
          </button>
          <div class="menu-dropdown submenu-dropdown">
            <button class="menu-item" onclick="importDefleMaskDmp();closeMenus()">DefleMask DMP…</button>
            <button class="menu-item" onclick="importFui();closeMenus()">Furnace FUI…</button>
            <button class="menu-item" onclick="importTfi();closeMenus()">TFI…</button>
            <button class="menu-item" onclick="importVgi();closeMenus()">VGI…</button>
            <button class="menu-item" onclick="importOpni();closeMenus()">OPNI…</button>
          </div>
        </div>
        <div class="menu-wrap submenu-wrap" id="menuExport">
          <button class="menu-item" onclick="toggleSubmenu('menuExport')">
            <span>Export</span>
            <span class="submenu-arrow" aria-hidden="true"></span>
          </button>
          <div class="menu-dropdown submenu-dropdown">
            <button class="menu-item" onclick="exportVgm();closeMenus()">VGM…</button>

  <script type="module">
    import { IRPlayer } from './src/ir-player.js';
    import { renderVgm } from './src/export-vgm.js';
    import { renderWav } from './src/export-wav.js';
    import { midiToFnumBlock, CH_NAME_TO_INDEX, PSG_CH_NAME_TO_INDEX } from './src/ir-utils.js';
    import { compileMMLisp } from './src/mmlisp2ir.js';
    import { parse } from './src/mmlisp-parser.js';
    import { formatMMLisp } from './src/mmlisp-formatter.js';

    // -----------------------------------------------------------------------
    // CodeMirror 6 — loaded from CDN
    // -----------------------------------------------------------------------
    const { EditorView, Decoration, lineNumbers, keymap } = await import('https://esm.sh/@codemirror/view@6');
    const { EditorState, StateField, StateEffect } = await import('https://esm.sh/@codemirror/state@6');
    const { syntaxHighlighting, HighlightStyle, StreamLanguage, indentService, indentUnit, foldService, foldGutter, foldKeymap, codeFolding } = await import('https://esm.sh/@codemirror/language@6');
    const { tags } = await import('https://esm.sh/@lezer/highlight@1');
    const { history, historyKeymap, indentWithTab, insertNewlineAndIndent } = await import('https://esm.sh/@codemirror/commands@6');
    const { autocompletion } = await import('https://esm.sh/@codemirror/autocomplete@6');

    // Resolve a 1-based source span { line, column, endLine, endColumn } to a
    // [from, to) document offset range, clamped to the document.
    function srcToRange(doc, src) {
      const lineObj = doc.line(src.line);
      const from = lineObj.from + (src.column - 1);
      const endLineObj = (src.endLine ?? src.line) === src.line
        ? lineObj
        : doc.line(src.endLine);
      const to = endLineObj.from + ((src.endColumn ?? src.column + 1) - 1);
      return [
        Math.max(0, Math.min(doc.length, from)),
        Math.max(from + 1, Math.min(doc.length, to)),
      ];
    }

    // Playhead highlights (token per track + active step sequences). IR events
    // carry source positions in the document the active IR was BUILT from, but
    // editing during playback does not recompile — so positions are resolved
    // against that build-time document once, then MAPPED through later edits so
    // the highlight follows the text. Re-anchored on play / build.
    //   setTrackLine: { trackIdx, src } — trackIdx=-1 clears all; src null removes one
    //   setSeq:       { show, src } or { clear: true }  (ref-counted per [...] literal)
    //   setPlayheadBase: re-anchor to the current doc (the active IR was just (re)built)
    const setTrackLine = StateEffect.define();
    const setSeq = StateEffect.define();
    const setPlayheadBase = StateEffect.define();

    // Resolve a build-time src to current-document [from, to): resolve against the
    // anchor doc, then map through edits accumulated since the anchor.
    function resolvePlayhead(src, builtDoc, changes, curDoc) {
      let [from, to] = srcToRange(builtDoc ?? curDoc, src);
      if (changes) { from = changes.mapPos(from, 1); to = changes.mapPos(to, -1); }
      return [
        Math.max(0, Math.min(curDoc.length, from)),
        Math.max(from + 1, Math.min(curDoc.length, to)),
      ];
    }

    const playheadField = StateField.define({
      // toks: Map<trackIdx, {from,to,cls}>; seqs: Map<"line:col", {from,to,count,cls}>
      // builtDoc: anchor Text; changes: ChangeSet since anchor (null == identity)
      create: () => ({ toks: new Map(), seqs: new Map(), builtDoc: null, changes: null }),
      update(v, tr) {
        let { toks, seqs, builtDoc, changes } = v;
        let dirty = false;
        const own = () => { if (!dirty) { toks = new Map(toks); seqs = new Map(seqs); dirty = true; } };

        // Follow edits: map existing ranges and accumulate changes since anchor.
        if (tr.docChanged) {
          own();
          const remap = (r) => {
            const from = tr.changes.mapPos(r.from, 1);
            return { ...r, from, to: Math.max(from + 1, tr.changes.mapPos(r.to, -1)) };
          };
          for (const [k, r] of toks) toks.set(k, remap(r));
          for (const [k, r] of seqs) seqs.set(k, remap(r));
          changes = changes ? changes.compose(tr.changes) : tr.changes;
        }

        for (const e of tr.effects) {
          if (e.is(setPlayheadBase)) {
            own(); toks.clear(); seqs.clear();
            builtDoc = tr.state.doc; changes = null;
          } else if (e.is(setTrackLine)) {
            own();
            const { trackIdx, src } = e.value;
            if (trackIdx === -1) toks.clear();
            else if (!src) toks.delete(trackIdx);
            else try {
              const [from, to] = resolvePlayhead(src, builtDoc, changes, tr.state.doc);
              toks.set(trackIdx, { from, to, cls: `cm-playTok-${trackIdx % 4}` });
            } catch (_) {}
          } else if (e.is(setSeq)) {
            own();
            if (e.value.clear) { seqs.clear(); continue; }
            const { show, src } = e.value;
            const key = `${src.line}:${src.column}`;
            const cur = seqs.get(key);
            const count = (cur?.count ?? 0) + (show ? 1 : -1);
            if (count <= 0) seqs.delete(key);
            else if (cur) seqs.set(key, { ...cur, count });
            else try {
              const [from, to] = resolvePlayhead(src, builtDoc, changes, tr.state.doc);
              seqs.set(key, { from, to, count, cls: 'cm-playSeq' });
            } catch (_) {}
          }
        }

        return dirty ? { toks, seqs, builtDoc, changes } : v;
      },
    });

    // Offsets in playheadField are already current (mapped in its update), so just
    // build marks from them — no implicit re-mapping.
    const playheadDecorations = EditorView.decorations.compute([playheadField], (state) => {
      const v = state.field(playheadField);
      const decos = [];
      for (const r of v.seqs.values()) decos.push(Decoration.mark({ class: r.cls }).range(r.from, r.to));
      for (const r of v.toks.values()) decos.push(Decoration.mark({ class: r.cls }).range(r.from, r.to));
      return decos.length ? Decoration.set(decos, true) : Decoration.none;
    });

    // MMLisp StreamLanguage for syntax highlighting.
    // Only two things get accent: the call name (first symbol after `(`) and
    // `:params`. Everything else (notes, numbers, macro names, brackets,
    // operators) stays the default foreground; comments are dimmed.
    const mmlispMode = StreamLanguage.define({
      startState: () => ({ head: false }), // head: next identifier is in call position
      token(stream, state) {
        if (stream.eatSpace()) return null; // keep `head` across whitespace
        if (stream.peek() === ';') { stream.skipToEnd(); return 'comment'; }
        if (stream.peek() === '"') {
          stream.next();
          while (!stream.eol()) { if (stream.next() === '"') break; }
          state.head = false;
          return null;
        }
        if (stream.eat('(')) { state.head = true; return null; }
        if (stream.eat(')') || stream.eat('[') || stream.eat(']')) { state.head = false; return null; }
        if (stream.eat(':')) {
          stream.match(/^[a-zA-Z][a-zA-Z0-9#_-]*/);
          state.head = false;
          return 'atom'; // :param → accent
        }
        if (stream.match(/^[+-]?\d+(?:\/\d+)?/)) { state.head = false; return null; }
        if (stream.match(/^[a-zA-Z][a-zA-Z0-9-]*/)) {
          const op = state.head;
          state.head = false;
          return op ? 'keyword' : null; // call name → accent ; operand → foreground
        }
        stream.next();
        state.head = false;
        return null;
      },
    });

    // Custom highlight: accent for call names / :params, mid for comments.
    // Everything else falls through to the editor's default foreground.
    const mmlispHighlight = HighlightStyle.define([
      { tag: tags.comment, color: 'var(--mid)' },
      { tag: tags.keyword, color: 'var(--accent)' },
      { tag: tags.atom, color: 'var(--accent)' },
    ]);

    // -----------------------------------------------------------------------
    // Autocomplete
    // -----------------------------------------------------------------------
    const AC_FORMS = [
      'score','rest','tie',
      'def','defn','x','goto','param-set',
      'linear',
      'ease-in','ease-out','ease-inout',
      'ease-in-sine','ease-out-sine','ease-inout-sine',
      'ease-in-quad','ease-out-quad','ease-inout-quad',
      'ease-in-cubic','ease-out-cubic','ease-inout-cubic',
      'ease-in-quart','ease-out-quart','ease-inout-quart',
      'ease-in-quint','ease-out-quint','ease-inout-quint',
      'ease-in-expo','ease-out-expo','ease-inout-expo',
      'ease-in-circ','ease-out-circ','ease-inout-circ',
      'ease-in-back','ease-out-back','ease-inout-back',
      'ease-in-elastic','ease-out-elastic','ease-inout-elastic',
      'ease-in-bounce','ease-out-bounce','ease-inout-bounce',
      'sin','triangle','square','saw','ramp',
      'noise','pink','perlin',
    ];
    const AC_TRACKS = [
      'fm1','fm2','fm3','fm3-csm','fm3-csm-rate','fm3-1','fm3-2','fm3-3','fm3-4',
      'fm4','fm5','fm6',
      'sqr1','sqr2','sqr3','noise',
      'pcm1','pcm2','pcm3',
    ];
    // Keyword params suggested after ':'. Keep in sync with the keywords the
    // compiler accepts (mmlisp2ir.js: canonicalTarget, track/note options,
    // curve params). FM operator params are generated per operator (1–4).
    const AC_FM_OP_PARAMS = ['ar','dr','sr','rr','sl','tl','ml','dt','ks','am']
      .flatMap(p => [1, 2, 3, 4].map(op => `:${p}${op}`));
    const AC_PARAMS = [
      // score / meta
      ':title',':author',':tempo',':lfo-rate',':shuffle',':shuffle-base',
      // track / channel
      ':ch',':id',':prio',':oct',':len',':gate',':vel',':vol',':volume',
      ':master',':pan',':mode',':write',
      // note dynamics / sequencer
      ':pitch',':semi',':keyon',':delay',':delay-vels',':glide',':glide-from',
      ':tempo-scale',':csm-rate',
      // macro / voice / definitions
      ':macro',':extend',':step',':loop',':loop-start',':loop-end',
      ':file',':sample',':rate',
      // PCM / effects
      ':bit-depth',':compress',':reverb',
      // curve params
      ':from',':to',':phase',':wait',':duty',':skew',':hold',':jitter',
      ':beta',':octaves',':lacunarity',':persistence',':leak',
      // FM channel
      ':alg',':fb',':ams',':fms',
      // FM operator params (×4)
      ...AC_FM_OP_PARAMS,
    ];
    const AC_MODE_VALUES = ['shot', 'loop'];

    function mmlispCompletions(context) {
      // After '(' — suggest forms and track names
      const formMatch = context.matchBefore(/\([a-zA-Z0-9_-]*/);
      if (formMatch) {
        const typed = formMatch.text.slice(1); // strip '('
        const options = [...AC_FORMS, ...AC_TRACKS]
          .filter(s => s.startsWith(typed))
          .map(s => ({ label: s, type: 'keyword', apply: s + ' ' }));
        if (options.length === 0 && !context.explicit) return null;
        return { from: formMatch.from + 1, options };
      }
      // After ':' — suggest keyword params and pitches
      const kwMatch = context.matchBefore(/:([a-zA-Z0-9#_-]*)/);
      if (kwMatch) {
        const typed = kwMatch.text;
        const options = [...AC_PARAMS]
          .filter(s => s.startsWith(typed))
          .map(s => ({ label: s, type: 'property' }));
        if (options.length === 0 && !context.explicit) return null;
        return { from: kwMatch.from, options };
      }

      // After ':mode ' — suggest PCM mode values
      const line = context.state.doc.lineAt(context.pos);
      const before = context.state.sliceDoc(line.from, context.pos);
      const modeMatch = /:mode\s+([a-z-]*)$/.exec(before);
      if (modeMatch) {
        const typed = modeMatch[1];
        const options = AC_MODE_VALUES
          .filter(s => s.startsWith(typed))
          .map(s => ({ label: s, type: 'enum' }));
        if (options.length === 0 && !context.explicit) return null;
        return { from: context.pos - typed.length, options };
      }

      return null;
    }

    // MMLisp auto-indent service (Lisp-style: align to char after opening paren,
    // or indent +2 if nothing follows the paren on that line)
    const mmlispIndent = indentService.of((context, pos) => {
      const doc = context.state.doc;
      const src = doc.sliceString(0, pos);

      // Scan src tracking unmatched opening parens, skipping strings/comments.
      const openStack = [];
      let inStr = false;
      for (let i = 0; i < src.length; i++) {
        const ch = src[i];
        if (inStr) {
          if (ch === '\\') { i++; } // escape
          else if (ch === '"') { inStr = false; }
        } else if (ch === '"') {
          inStr = true;
        } else if (ch === ';') {
          // skip to end of line
          while (i < src.length && src[i] !== '\n') i++;
        } else if (ch === '(') {
          openStack.push(i);
        } else if (ch === ')') {
          if (openStack.length > 0) openStack.pop();
        }
      }

      if (openStack.length === 0) return 0;
      const lastOpenPos = openStack[openStack.length - 1];

      const openLine = doc.lineAt(lastOpenPos);
      const openCol = lastOpenPos - openLine.from;

      // Always indent +2 from ( — matches the formatter's childIndent rule
      return openCol + 2;
    });

    const mmlispParenFold = foldService.of((state, lineStart) => {
      const doc = state.doc;

      const header = [`  :alg ${parsed.alg}`, `:fb ${parsed.fb}`];
      if (parsed.ams !== 0) header.push(`:ams ${parsed.ams}`);
      if (parsed.fms !== 0) header.push(`:fms ${parsed.fms}`);

      const lines = [
        `(def ${voiceName}`,
        header.join(' '),
      ];

      for (let i = 0; i < 4; i++) {
        const op = parsed.ops[i];
        const n = i + 1;
        const parts = [
          `  :ar${n} ${op.ar}`,
          `:dr${n} ${op.dr}`,
          `:sr${n} ${op.sr}`,
          `:rr${n} ${op.rr}`,
          `:sl${n} ${op.sl}`,
          `:tl${n} ${op.tl}`,
          `:ks${n} ${op.rs}`,
          `:ml${n} ${op.mul}`,
          `:dt${n} ${op.dt}`,
        ];
        if (op.ssg !== 0) parts.push(`:ssg${n} ${op.ssg}`);
        if (op.am !== 0) parts.push(`:am${n} ${op.am}`);
        lines.push(
          parts.join(' '),
        );
      }
      lines.push(')');
      return lines.join('\n');
    }

    const FM_IMPORT_FORMATS = Object.freeze({

    function detectFmImportFormatKey(fileName) {
      const name = String(fileName || '').toLowerCase();
      if (name.endsWith('.dmp')) return 'DMP';
      if (name.endsWith('.fui')) return 'FUI';
      if (name.endsWith('.tfi')) return 'TFI';
      if (name.endsWith('.vgi')) return 'VGI';
      if (name.endsWith('.opni')) return 'OPNI';
      return null;
    }

    async function importFmVoiceFromFile(file, key) {
      const fmt = FM_IMPORT_FORMATS[key];
      if (!fmt) throw new Error(`Unknown import format: ${key}`);
      const bytes = new Uint8Array(await file.arrayBuffer());
      const parsed = fmt.parser(bytes);
      const voiceName = makeVoiceNameFromFile(file.name);
      const text = buildMmlispVoiceFromDmp(parsed, voiceName);
      insertTextAtCursor(text);
      log(`Imported ${file.name} (${fmt.label}) as ${voiceName} — press Build to apply`, 'info');
    }

    function pickFileWithInput(extensions) {
      const accept = Array.isArray(extensions) ? extensions.join(',') : '';
      return new Promise((resolve, reject) => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = accept;
        input.style.position = 'fixed';
        input.style.left = '-9999px';
        input.style.width = '1px';
        input.style.height = '1px';
        document.body.appendChild(input);

        const cleanup = () => {
          input.removeEventListener('change', onChange);
          input.remove();
        };

        const onChange = () => {
          const file = input.files && input.files[0];
          cleanup();
          if (!file) {
            const err = new Error('Import canceled');
            err.name = 'AbortError';
            reject(err);
            return;
          }
          resolve(file);
        };

        input.addEventListener('change', onChange, { once: true });
        input.click();
      });
    }

    async function pickImportFile(options) {
      // Always prefer plain file input for import to avoid browser File System Access
      // restrictions like "contains system files" on some folders/platforms.
      return pickFileWithInput(options.extensions);

        log(`${options.label} import failed: ${e?.message || e}`, 'err');
        try {

    // -----------------------------------------------------------------------
    // Manual compile (Tools > Build / Cmd-Ctrl+B)
    // -----------------------------------------------------------------------
    let _lastGoodIR = null;     // last successfully compiled IR object
    let _lastSourceMap = null;  // source map from last compile
    let _lastFileName = 'untitled.mmlisp';
    let _sourceHandle = null;
    let _sourceFileName = null;
    let _sourceDir = null;
    let _unsavedSamplePathWarned = false;
    const _pcmSampleCache = new Map();
    const _pcmCompiledCache = new Map();

    function toFetchablePath(path) {
      if (!path) return null;
      if (/^[a-zA-Z][a-zA-Z0-9+.-]*:\/\//.test(path)) return path;
      if (path.startsWith('/')) return path;
      return '/' + path;
    }

    function audioBufferToMono(decoded) {
      const channels = decoded.numberOfChannels;
      const length = decoded.length;
      const mono = new Float32Array(length);
      if (channels <= 1) {
        mono.set(decoded.getChannelData(0));
      } else {
        const left = decoded.getChannelData(0);
        const right = decoded.getChannelData(1);
        for (let i = 0; i < length; i++) mono[i] = (left[i] + right[i]) * 0.5;
      }
      return mono;
    }

    function signedPcm8Base64ToMono(dataBase64) {
      const bin = atob(dataBase64);
      const len = bin.length;
      const mono = new Float32Array(len);
      for (let i = 0; i < len; i++) {
        const u = bin.charCodeAt(i) & 0xff;
        const s8 = u > 127 ? u - 256 : u;
        mono[i] = s8 / 128;
      }
      return mono;
    }

    async function decodePcmSample(path) {
      const cached = _pcmSampleCache.get(path);
      if (cached) return cached;
      const url = toFetchablePath(path);
      if (!url || !audioCtx) return null;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const encoded = await res.arrayBuffer();
      const decoded = await audioCtx.decodeAudioData(encoded.slice(0));
      const out = { data: audioBufferToMono(decoded), sampleRate: decoded.sampleRate };
      _pcmSampleCache.set(path, out);
      return out;
    }

    function decodeCompiledPcmSample(def) {
      const compiled = def?.compiled;
      if (!compiled || compiled.format !== 'pcm_s8' || !compiled.dataBase64) {
        return null;
      }

      const cacheKey = `${String(def?.name || '')}:${compiled.dataBase64.length}:${compiled.sourceSampleRate || 0}`;
      const cached = _pcmCompiledCache.get(cacheKey);
      if (cached) return cached;

      const sampleRate = Number(compiled.sourceSampleRate) > 0
        ? Number(compiled.sourceSampleRate)
        : (Number(def?.rate) > 0 ? Number(def.rate) : 44100);

      const out = { data: signedPcm8Base64ToMono(compiled.dataBase64), sampleRate };
      _pcmCompiledCache.set(cacheKey, out);
      return out;
    }

    async function syncPcmSamplesToWorklet(ir) {
      if (!workletNode) return;
      const defs = ir?.metadata?.samples;
      if (!Array.isArray(defs) || defs.length === 0) {
        workletNode.port.postMessage({ type: 'pcm-set-samples', samples: [] });
        return;
      }

      const samples = [];
      for (const def of defs) {
        if (!def?.name) continue;
        try {
          let decoded = decodeCompiledPcmSample(def);
          if (!decoded) {
            const sourcePath = def?.resolvedFile || def?.file;
            if (!sourcePath) continue;
            decoded = await decodePcmSample(sourcePath);
          }
          if (!decoded) continue;
          samples.push({
            name: String(def.name),
            data: decoded.data,
            sampleRate: decoded.sampleRate,
            loopStart: Number.isFinite(def.loopStart) ? def.loopStart : null,
            loopEnd: Number.isFinite(def.loopEnd) ? def.loopEnd : null,
          });
        } catch (e) {
          log(`PCM load failed (${def.name}): ${e.message}`, 'err');
        }
      }

      workletNode.port.postMessage({ type: 'pcm-set-samples', samples });
    }

    function setSourceContextFromHandle(handle) {
      _sourceHandle = handle;
      _sourceFileName = handle?.name || null;
      _sourceDir = null;

    async function readFileHandle(handle) {
      const file = await handle.getFile();
      const fmImportKey = detectFmImportFormatKey(file.name);
      if (fmImportKey) {
        await importFmVoiceFromFile(file, fmImportKey);
        return;
      }
      if (/\.mmb(?:$|\?)/i.test(file.name)) {
        _sourceHandle = null;
        _sourceFileName = file.name;
        _sourceDir = null;
        currentIrURL = URL.createObjectURL(file);
        _lastGoodIR = null;
        _lastSourceMap = null;
        _lastFileName = file.name;
        setEditorDoc('(binary MMB preset loaded)');
        log('Loaded ' + file.name + ' as binary preset', 'info');
        return;
      }
      const src = await file.text();
      setSourceContextFromHandle(handle);
      _lastGoodIR = null;
      _lastSourceMap = null;
      setEditorDoc(src);
      compileNow();
    }

    function newFile() {
      _sourceHandle = null;
      _sourceFileName = null;
      _sourceDir = null;

    // Compile the current source to IR. Logs diagnostics, updates _lastGoodIR /
    // _lastSourceMap on success, and returns { ir, ok }. Does NOT apply to the
    // running player — callers decide (see buildAction).
    function compileNow() {
      const src = editorView.state.doc.toString();
      try {
        const { ir, diagnostics, sourceMap } = compileMMLisp(src, _lastFileName);
        const sampleDefs = Array.isArray(ir?.metadata?.samples) ? ir.metadata.samples : [];
        const hasSamples = sampleDefs.length > 0;
        const hasSavedBase = Boolean(_sourceHandle) || Boolean(currentIrURL);
        if (hasSamples && !hasSavedBase) {
          if (!_unsavedSamplePathWarned) {
            log('Sample paths may not resolve reliably until this source is saved (File > Save As...)', 'err');
            _unsavedSamplePathWarned = true;
          }
        } else {
          _unsavedSamplePathWarned = false;
        }
        const errors = diagnostics.filter(d => d.severity === 'error');
        if (errors.length > 0) {
          for (const d of errors) {
            log(`[E] ${d.code} ${d.track || 'global'}:${d.line}:${d.column} ${d.message}`, 'err');
          }
          return { ir: null, ok: false };
        }
        _lastGoodIR = ir;
        _lastSourceMap = sourceMap;
        buildChStrips(ir);
        // Anchor playhead highlights to the document this IR was compiled from.
        // Later edits (without rebuild) are mapped from here so highlights track
        // the text. Edits compose into the field even while stopped.
        editorView.dispatch({ effects: setPlayheadBase.of(null) });
        return { ir, ok: true };
      } catch (e) {
        log('[compile] ' + e.message, 'err');
        return { ir: null, ok: false };
      }
    }

    // Manual build (Tools > Build / Cmd-Ctrl+B): compile, then — if playing —
    // apply gaplessly at the next bar boundary. Errors keep the last good IR.
    function buildAction() {
      const { ir, ok } = compileNow();
      if (!ok) return;
      if (player) {
        syncPcmSamplesToWorklet(ir).catch((e) => {
          log('PCM sync failed: ' + e.message, 'err');
        });
        player.swapAtNextBar(ir);
        log('Built — applies at next bar', 'info');
      } else {
        log('Built', 'info');
      }
    }

    // Wire editor → live compile is registered in EditorState extensions above.

    // -----------------------------------------------------------------------
    // State
    // -----------------------------------------------------------------------
    let audioCtx = null;
    let workletNode = null;
    let _initAudioPromise = null;
    let player = null;
    let currentIrURL = null;
    let selectedCh = null;                 // hardware FM/PSG index (0-9) or null — drives the FM param panel
    let selectedChannel = null;            // head of the selected strip (e.g. "fm3-1") for highlight
    const CURSOR_DEF_PREVIEW_CH = 0;        // FM channel used to audition a cursor FM def (incl. its op mask)
    let _prevFmParamMode = null;            // previous getFmParamMode(), to detect entering cursor-def
    let _prevCursorDefKey = null;           // identity of the def under the cursor, to detect switching defs
    const _mutedChannels = new Set();      // muted channel names (heads)
    const _soloChannels = new Set();       // soloed channel names (heads)
    let _chStripModel = [];                // [{ head, label, trackIndex, selIndex }] built from the current IR
    // Canonical hardware order of score channel heads. fm3-csm-rate has no strip
    // of its own — it folds into the single "fm3-csm" (csm) strip.
    const CHANNEL_ORDER = ['fm1','fm2','fm3','fm3-1','fm3-2','fm3-3','fm3-4','fm3-csm',
      'fm4','fm5','fm6','sqr1','sqr2','sqr3','noise','pcm1','pcm2','pcm3'];
    let _fmCursorDefContext = null;
    let _stepInputEnabled = false;
    let _kbBaseOctave = 3;
    let _kbAppliedDefSig = null;
    const _kbPointerMap = new Map();

    const KB_MAX_BASE_OCT = 6;
    const _kbPcLikeQuery = window.matchMedia('(hover: hover) and (pointer: fine)');
    const KB_WHITE_SEMITONES = [0, 2, 4, 5, 7, 9, 11];
    const KB_BLACK_DEFS = [
      { semitone: 1, whiteAfter: 1 },
      { semitone: 3, whiteAfter: 2 },
      { semitone: 6, whiteAfter: 4 },
      { semitone: 8, whiteAfter: 5 },
      { semitone: 10, whiteAfter: 6 },
    ];
    const KB_SEMITONES = [
      { name: 'C',  black: false },
      { name: 'C#', black: true },
      { name: 'D',  black: false },
      { name: 'D#', black: true },
      { name: 'E',  black: false },
      { name: 'F',  black: false },
      { name: 'F#', black: true },
      { name: 'G',  black: false },
      { name: 'G#', black: true },
      { name: 'A',  black: false },
      { name: 'A#', black: true },

    // -----------------------------------------------------------------------
    // Channel strips: mute / solo (driven by the compiled score)
    // -----------------------------------------------------------------------
    // Hardware-index labels, still used by the FM param-panel status (channelLabel).
    const FM_LABELS  = ['F1','F2','F3','F4','F5','F6'];
    const PSG_LABELS = ['S1','S2','S3','N1'];

    // Score channel name (head) → short strip label (e.g. "fm3-1" → "F3-1").
    function channelLabelOf(head) {
      let label = head;
      let m;
      if (head === 'fm3-csm') label = 'csm';
      else if ((m = /^fm([1-6])$/.exec(head))) label = 'f' + m[1];
      else if ((m = /^fm3-([1-4])$/.exec(head))) label = 'f3-' + m[1];
      else if ((m = /^sqr([1-3])$/.exec(head))) label = 's' + m[1];
      else if (head === 'noise') label = 'n1';
      else if ((m = /^pcm([1-3])$/.exec(head))) label = 'p' + m[1];
      return label.toUpperCase();
    }

    // Hardware index that drives the FM param panel for a given head:
    // 0-5 = FM, 6-9 = PSG, null = no FM/PSG params (pcm*, csm).
    function selIndexForHead(head) {
      if (/^fm3-[1-4]$/.test(head)) return CH_NAME_TO_INDEX.fm3;
      if (CH_NAME_TO_INDEX[head] != null) return CH_NAME_TO_INDEX[head];
      if (PSG_CH_NAME_TO_INDEX[head] != null) return 6 + PSG_CH_NAME_TO_INDEX[head];
      return null;
    }

    // Build the strip model from the IR's used channels, in canonical hardware
    // order. fm3-csm-rate (Timer-A control) is intentionally excluded; the csm
    // strip targets the sounding fm3-csm track.
    function buildChStripModel(ir) {
      const tracks = ir?.tracks ?? [];
      const headToTrack = new Map();
      tracks.forEach((t, ti) => {
        const head = t.scoreChannel ?? t.channel;
        if (head != null && !headToTrack.has(head)) headToTrack.set(head, ti);
      });
      const model = [];
      for (const head of CHANNEL_ORDER) {
        if (!headToTrack.has(head)) continue;
        model.push({
          head,
          label: channelLabelOf(head),
          trackIndex: headToTrack.get(head),
          selIndex: selIndexForHead(head),
        });
      }
      return model;
    }

    function buildChStrips(ir) {
      _chStripModel = buildChStripModel(ir);
      // Persist mute/solo by channel name, but drop state for channels that are
      // no longer in the score (a removed-then-readded channel returns fresh).
      const present = new Set(_chStripModel.map((e) => e.head));
      for (const h of _mutedChannels) if (!present.has(h)) _mutedChannels.delete(h);
      for (const h of _soloChannels) if (!present.has(h)) _soloChannels.delete(h);
      if (selectedChannel != null && !present.has(selectedChannel)) {
        selectedChannel = null;
        selectedCh = null;
      }
      renderChStrips();
    }

    function renderChStrips() {
      const el = document.getElementById('chStrips');
      if (!el) return;
      el.innerHTML = '';
      const row = document.createElement('div');
      row.className = 'ch-strips-row';
      for (const entry of _chStripModel) {
        const h = entry.head;
        const selCls  = selectedChannel === h ? ' ch-sel' : '';
        const muteCls = _mutedChannels.has(h) ? ' muted' : '';
        const soloCls = _soloChannels.has(h) ? ' soloed' : '';
        const col = document.createElement('div');
        col.className = 'ch-col';
        col.innerHTML = `
          <button class="ms-btn${selCls}" onclick="selectCh('${h}')">${entry.label}</button>
          <button class="ms-btn${muteCls}" onclick="toggleMute('${h}')" style="margin-top:0.35rem">M</button>
          <button class="ms-btn${soloCls}" onclick="toggleSolo('${h}')">S</button>
        `;
        row.appendChild(col);
      }
      el.appendChild(row);
    }

    function _trackIndexOf(head) {
      return _chStripModel.find((e) => e.head === head)?.trackIndex;
    }

    function toggleMute(head) {
      const on = !_mutedChannels.has(head);
      if (on) _mutedChannels.add(head); else _mutedChannels.delete(head);
      const ti = _trackIndexOf(head);
      if (ti != null) player?.muteTrack(ti, on);
      renderChStrips();
    }

    function toggleSolo(head) {
      const on = !_soloChannels.has(head);
      if (on) _soloChannels.add(head); else _soloChannels.delete(head);
      const ti = _trackIndexOf(head);
      if (ti != null) player?.soloTrack(ti, on);
      renderChStrips();
    }

    // Push persisted mute/solo (kept by channel name) onto a freshly loaded player,
    // translating names → track indices from the current strip model.
    function applyPlayerMuteSoloState(p) {
      if (!p) return;
      p.clearChannelStates();
      for (const entry of _chStripModel) {
        if (_mutedChannels.has(entry.head)) p.muteTrack(entry.trackIndex, true);
        if (_soloChannels.has(entry.head)) p.soloTrack(entry.trackIndex, true);
      }
    }

    window.toggleMute = toggleMute;
    window.toggleSolo = toggleSolo;
    window.selectCh   = selectCh;

    // -----------------------------------------------------------------------
    // Horizontal divider drag
    // -----------------------------------------------------------------------
    (() => {
      const divider = document.getElementById('hDivider');
      const consolePane = document.getElementById('consolePane');
      let dragging = false, startY = 0, startH = 0;
      divider.addEventListener('mousedown', (e) => {
        dragging = true;
        startY = e.clientY;
        startH = consolePane.offsetHeight;
        document.body.style.userSelect = 'none';
        document.body.style.cursor = 'row-resize';
      });
      document.addEventListener('mousemove', (e) => {
        if (!dragging) return;
        const delta = startY - e.clientY;
        const newH = Math.max(40, Math.min(startH + delta, window.innerHeight * 0.6));
        consolePane.style.height = newH + 'px';
      });
      document.addEventListener('mouseup', () => {
        dragging = false;
        document.body.style.userSelect = '';
        document.body.style.cursor = '';
      });
    })();

    // -----------------------------------------------------------------------
    // Audio
    // -----------------------------------------------------------------------
    function writeToWorklet(portOrMsg, addr, data, when) {
      if (!workletNode) return;
      if (portOrMsg && typeof portOrMsg === 'object' && !Array.isArray(portOrMsg)) {
        workletNode.port.postMessage(portOrMsg);
        return;
      }
      workletNode.port.postMessage({ type: 'write', port: portOrMsg, addr, data, when });
    }

    let _workletReady = false;

    function isCoarsePointerDevice() {
      return window.matchMedia('(hover: none) and (pointer: coarse)').matches;
    }

    function audioWorkletUnavailableReason() {
      const protocol = window.location?.protocol ?? 'unknown';
      const host = window.location?.host ?? 'unknown';
      const secure = window.isSecureContext;
      const hasAPI = !!window.AudioWorkletNode;
      const reason = !secure && protocol !== 'https:'
        ? `insecure context (${protocol}//${host})`
        : 'AudioWorklet API not supported in this browser runtime';
      return { reason, protocol, host, secure, hasAPI };
    }

    async function ensureWorkletNode() {
      if (_workletReady) return;
      if (!audioCtx?.audioWorklet || typeof audioCtx.audioWorklet.addModule !== 'function') {
        const info = audioWorkletUnavailableReason();
        throw new Error(`AudioWorklet unavailable: ${info.reason}`);
      }
      await audioCtx.audioWorklet.addModule('./worklet.js');
      workletNode = new AudioWorkletNode(audioCtx, 'ym2612-processor', {
        numberOfOutputs: 1,
        outputChannelCount: [2],
      });
      workletNode.port.onmessage = (event) => {
        const msg = event.data;
        if (msg?.type === 'error') {
          log('Worklet error: ' + msg.message, 'err');
        }
      };
      workletNode.connect(audioCtx.destination);
      // Apply the current analog-LPF state to the freshly created node.
      workletNode.port.postMessage({ type: 'set-analog-lpf', on: analogLpfOn, cutoffHz: ANALOG_LPF_CUTOFF });
      _workletReady = true;
    }

    // Mega Drive Model 1 analog output low-pass (~3 kHz). Switchable.
    const ANALOG_LPF_CUTOFF = 3000;
    let analogLpfOn = false;
    function updateAnalogLpfCheck() {
      const el = document.getElementById('analogLpfCheck');
      if (el) el.textContent = analogLpfOn ? '✓' : '';
    }
    function toggleAnalogLpf() {
      analogLpfOn = !analogLpfOn;
      updateAnalogLpfCheck();
      workletNode?.port.postMessage({ type: 'set-analog-lpf', on: analogLpfOn, cutoffHz: ANALOG_LPF_CUTOFF });
    }
    // Module-scope functions aren't global; expose for the inline onclick.
    window.toggleAnalogLpf = toggleAnalogLpf;

    // Pre-load the worklet module on page load (no user gesture needed).
    // AudioContext starts suspended — we only need to resume() on first click.
    (async () => {
      if (isCoarsePointerDevice()) {
        // On mobile Safari, create/resume in a user gesture chain for reliability.
        return;
      }
      try {
        audioCtx = new AudioContext({ sampleRate: 48000 });
        log('AudioContext @ ' + audioCtx.sampleRate + ' Hz', 'info');
        await ensureWorkletNode();
      } catch (e) {
        log('Worklet preload failed: ' + e.message, 'err');
      }
    })();

    function initAudio() {
      if (_initAudioPromise) return _initAudioPromise;
      _initAudioPromise = (async () => {
        try {
          // If preload hasn't finished yet, wait for it (or retry)
          if (!audioCtx) {
            audioCtx = new AudioContext({ sampleRate: 48000 });
            log('AudioContext @ ' + audioCtx.sampleRate + ' Hz', 'info');
          }
          // On iOS/Safari this is safest inside the click/touch handler chain.
          if (audioCtx.state !== 'running') await audioCtx.resume();
          await ensureWorkletNode();
          return true;
        } catch (e) {
          const info = audioWorkletUnavailableReason();
          if (!audioCtx?.audioWorklet || typeof audioCtx.audioWorklet.addModule !== 'function') {
            log(`AudioWorklet unavailable: ${info.reason}`, 'err');
            log(`Hint: open over HTTPS (or localhost) and use Safari/iOS 14.5+`, 'err');
          }
          log('Audio init failed: ' + e.message, 'err');
          return false;
        } finally {
          _initAudioPromise = null;
        }
      })();
      return _initAudioPromise;
    }

    function setPlayIcon(playing) {
      document.getElementById('iconPlay').style.display  = playing ? 'none' : '';
      document.getElementById('iconPause').style.display = playing ? '' : 'none';
    }

    function onPlayToggle() {
      if (!player || (!player.isPlaying() && !_paused)) {
        onPlay();
      } else if (_paused) {
        onResume();
      } else {
        onPause();
      }
    }

    async function onPlay(fromLine = null) {
      const ok = await initAudio();
      if (!ok) return;
      // Manual-compile model: build on demand if nothing has been compiled yet
      // (e.g. after New File) so Play still works straight from source.
      if (!_lastGoodIR && !currentIrURL) compileNow();
      if (player) {
        player.stop();
        workletNode?.port.postMessage({ type: 'flush' });
      }
      player = new IRPlayer(writeToWorklet);
      try {
        // Use last successfully compiled IR if available, else load from URL
        if (_lastGoodIR) {
          player.loadJSON(_lastGoodIR);
          await syncPcmSamplesToWorklet(_lastGoodIR);
          log('Playing (compiled source)', 'info');
        } else if (currentIrURL && /\.mmb(?:$|\?)/i.test(currentIrURL)) {
          log('Loading ' + currentIrURL + '…');
          await player.loadMMB(currentIrURL);
          await syncPcmSamplesToWorklet(player._ir);
          log('Playing (MMB)', 'info');
        } else if (currentIrURL) {
          log('Loading ' + currentIrURL + '…');
          await player.loadURL(currentIrURL);
          await syncPcmSamplesToWorklet(player._ir);
          log('Playing', 'info');
        } else {
          throw new Error('No compiled IR available for the current source');
        }
        player.setOnLine(highlightTrackLine);
        player.setOnSeq(highlightSeq);
        const PARAM_KEY_MAP = { TL: 'tl', AR: 'ar', DR: 'dr', SL: 'sl', SR: 'd2r', RR: 'rr', ML: 'mul', DT: 'dt', KS: 'rs', SSG: 'ssg' };
        player.setOnParam((ch, target, value) => {
          if (ch !== selectedCh) return;
          if (target === 'FM_ALG') {
            setSlider('sl-alg', 'val-alg', value);
            document.getElementById('algDisplay').textContent = ALG_DESC[value] ?? '';
            updateOpRoles(value);
          } else if (target === 'FM_FB') {
            setSlider('sl-fb', 'val-fb', value);
          } else if (target === 'LFO_RATE') {
            setSlider('sl-lfo', 'val-lfo', value);
          } else if (target === 'FM_AMS') {
            setSlider('sl-ams', 'val-ams', value);
          } else if (target === 'FM_FMS') {
            setSlider('sl-fms', 'val-fms', value);
          } else {
            const m = target.match(/^FM_(TL|AR|DR|SL|SR|RR|ML|DT|KS|SSG)(\d)$/);
            if (m) {
              const key = PARAM_KEY_MAP[m[1]];
              setSlider(`sl-op${m[2]}-${key}`, `val-op${m[2]}-${key}`, value);
            }
          }
        });
        // Rebuild strips from the IR actually loaded (covers URL/.mmb sources
        // that never went through compileNow), then push persisted mute/solo.
        buildChStrips(player._ir);
        applyPlayerMuteSoloState(player);
        // Seek to cursor line if provided and source map available
        if (fromLine != null && _lastSourceMap) {
          player.playFromLine(audioCtx, fromLine, _lastSourceMap);
        } else {
          player.play(audioCtx);
        }
        setPlayIcon(true);
        document.getElementById('btnPlay').classList.add('active');
        document.getElementById('btnStop').disabled = false;
        syncParamUI();
      } catch (e) {
        log('Error: ' + e.message, 'err');
      }
    }

    function onStop() {
      player?.stop();
      workletNode?.port.postMessage({ type: 'flush' });
      player = null;
      log('Stopped');
      document.getElementById('btnPlay').classList.remove('active');
      setPlayIcon(false);
      editorView.dispatch({ effects: [setTrackLine.of({ trackIdx: -1 }), setSeq.of({ clear: true })] });
    }
