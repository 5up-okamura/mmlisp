<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GMLisp YM2612 Player</title>
  <style>
    * { box-sizing: border-box; }
    body {
      background: #111;
      color: #ddd;
      font-family: 'Courier New', monospace;
      margin: 0;
      padding: 2rem;
    }
    h1 { color: #7df; font-size: 1.2rem; margin: 0 0 0.4rem; }
    p.sub { color: #666; font-size: 0.8rem; margin: 0 0 2rem; }
    .panel {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 1.2rem;
      margin-bottom: 1rem;
      max-width: 640px;
    }
    label { display: block; font-size: 0.8rem; color: #888; margin-bottom: 0.4rem; }
    select, input[type="text"] {
      background: #222;
      border: 1px solid #444;
      color: #ddd;
      padding: 0.4rem 0.6rem;
      font-family: inherit;
      font-size: 0.9rem;
      border-radius: 2px;
      width: 100%;
      margin-bottom: 0.8rem;
    }
    .btn-row { display: flex; gap: 0.6rem; margin-top: 0.8rem; }
    button {
      background: #2a2a2a;
      border: 1px solid #555;
      color: #ccc;
      padding: 0.5rem 1.2rem;
      font-family: inherit;
      font-size: 0.85rem;
      border-radius: 2px;
      cursor: pointer;
    }
    button:hover { background: #333; border-color: #7df; color: #7df; }
    button:disabled { opacity: 0.35; cursor: default; }
    button.active { background: #1a3a4a; border-color: #7df; color: #7df; }
    #log {
      background: #0a0a0a;
      border: 1px solid #2a2a2a;
      border-radius: 2px;
      padding: 0.6rem;
      height: 140px;
      overflow-y: auto;
      font-size: 0.75rem;
      color: #5a8;
      line-height: 1.6;
    }
    #log .err { color: #e66; }
    #log .info { color: #7df; }
    .status-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #444;
      margin-right: 0.5rem;
    }
    .status-dot.playing { background: #5d8; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  </style>
</head>
<body>
  <h1>GMLisp YM2612 Player</h1>
  <p class="sub">Pure-JS FM synthesis — no plugins required</p>

  <div class="panel">
    <label>IR file (JSON)</label>
    <select id="presetSelect">
      <option value="/examples/ir/demo1-stage-loop.ir.canonical.json">demo1-stage-loop</option>
      <option value="/examples/ir/demo2-event-recovery.ir.canonical.json">demo2-event-recovery</option>
    </select>
    <label>or load local file</label>
    <input type="file" id="fileInput" accept=".json" style="display:none">
    <button onclick="document.getElementById('fileInput').click()">Browse…</button>

    <div class="btn-row">
      <button id="btnPlay" disabled onclick="onPlay()">▶ Play</button>
      <button id="btnStop" disabled onclick="onStop()">■ Stop</button>
    </div>

    <p style="font-size:0.75rem;color:#555;margin:0.8rem 0 0;">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Click Play to start (will prompt for audio permission)</span>
    </p>
  </div>

  <div class="panel">
    <label>Console</label>
    <div id="log"></div>
  </div>

  <script type="module">
    import { IRPlayer } from './src/ir-player.js';

    let audioCtx = null;
    let workletNode = null;
    let player = null;
    let currentIrURL = document.getElementById('presetSelect').value;

    const logEl = document.getElementById('log');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');

    function log(msg, cls = '') {
      const line = document.createElement('div');
      if (cls) line.className = cls;
      line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function setStatus(msg, playing = false) {
      statusText.textContent = msg;
      statusDot.className = 'status-dot' + (playing ? ' playing' : '');
    }

    function writeToWorklet(port, addr, data) {
      if (workletNode) {
        workletNode.port.postMessage({ type: 'write', port, addr, data });
      }
    }

    async function initAudio() {
      if (audioCtx) return true;

      try {
        audioCtx = new AudioContext({ sampleRate: 48000 });
        if (audioCtx.state === 'suspended') await audioCtx.resume();

        log('AudioContext created at ' + audioCtx.sampleRate + ' Hz', 'info');

        await audioCtx.audioWorklet.addModule('./worklet.js');
        workletNode = new AudioWorkletNode(audioCtx, 'ym2612-processor', {
          numberOfOutputs: 1,
          outputChannelCount: [2],
        });
        workletNode.connect(audioCtx.destination);

        workletNode.port.onmessage = (e) => log('worklet: ' + JSON.stringify(e.data));

        log('YM2612 worklet ready', 'info');
        return true;
      } catch (e) {
        log('Audio init failed: ' + e.message, 'err');
        return false;
      }
    }

    async function loadPreset() {
      const url = document.getElementById('presetSelect').value;
      currentIrURL = url;
      log('Loading: ' + url);
    }

    async function onPlay() {
      const ok = await initAudio();
      if (!ok) return;

      if (player) player.stop();

      player = new IRPlayer(writeToWorklet);

      try {
        log('Fetching IR…');
        await player.loadURL(currentIrURL);
        log('IR loaded, starting playback…', 'info');
        player.play(audioCtx);
        setStatus('Playing', true);
        document.getElementById('btnPlay').classList.add('active');
        document.getElementById('btnStop').disabled = false;
      } catch (e) {
        log('Playback error: ' + e.message, 'err');
        setStatus('Error');
      }
    }

    function onStop() {
      if (player) {
        player.stop();
        player = null;
        log('Stopped');
        setStatus('Stopped');
      }
      document.getElementById('btnPlay').classList.remove('active');
    }

    // File picker
    document.getElementById('fileInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const url = URL.createObjectURL(file);
      const opt = document.createElement('option');
      opt.value = url;
      opt.textContent = file.name;
      opt.selected = true;
      document.getElementById('presetSelect').appendChild(opt);
      currentIrURL = url;
      log('Loaded file: ' + file.name);
    });

    // Preset change
    document.getElementById('presetSelect').addEventListener('change', loadPreset);

    // Enable play button
    document.getElementById('btnPlay').disabled = false;

    // Expose for inline onclick
    window.onPlay = onPlay;
    window.onStop = onStop;

    log('Ready. Select a demo and press Play.', 'info');
  </script>
</body>
</html>
