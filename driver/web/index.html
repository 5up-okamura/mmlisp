<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GMLisp YM2612 Player</title>
  <link rel="icon" href="data:,">
  <!-- CodeMirror 6 -->
  <link rel="stylesheet" href="https://esm.sh/@codemirror/view@6/dist/index.css">
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; overflow: hidden; }
    body {
      background: #111;
      color: #ddd;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    /* ---- top bar ---- */
    #topbar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0 0.75rem;
      height: 36px;
      flex-shrink: 0;
      background: #161616;
      border-bottom: 1px solid #2a2a2a;
    }
    #topbar .sep {
      width: 1px;
      height: 18px;
      background: #333;
      margin: 0 0.25rem;
    }
    #topbar select {
      background: #1e1e1e;
      border: 1px solid #333;
      color: #ccc;
      padding: 0.2rem 0.4rem;
      font-family: inherit;
      font-size: 0.75rem;
      border-radius: 2px;
      cursor: pointer;
    }
    #topbar select:hover { border-color: #555; }
    .tb-btn {
      background: #1e1e1e;
      border: 1px solid #333;
      color: #aaa;
      font-family: inherit;
      font-size: 0.75rem;
      border-radius: 2px;
      cursor: pointer;
      white-space: nowrap;
    }
    .tb-btn:hover { border-color: #7df; color: #7df; background: #12283a; }
    .tb-btn:disabled { opacity: 0.3; cursor: default; }
    .tb-btn.active { border-color: #7df; color: #7df; background: #12303f; }
    #posDisplay {
      font-family: monospace;
      font-size: 0.78rem;
      color: #7df;
      letter-spacing: 0.05em;
    }
    #bpmDisplay {
      font-family: monospace;
      font-size: 0.78rem;
      color: #fd7;
      letter-spacing: 0.05em;
    }
    .play-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #4c9;
      flex-shrink: 0;
      display: none;
    }
    .play-dot.playing { display: block; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }
    #fileNameDisplay {
      font-size: 0.7rem;
      color: #777;
      margin-left: 0.25rem;
    }
    #topbar .spacer { flex: 1; }

    /* ---- main area ---- */
    #main {
      display: flex;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    /* ---- left column: editor + console ---- */
    #leftCol {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
    }
    #editorWrap {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      border-bottom: none;
    }
    #editorWrap .cm-editor {
      height: 100%;
      font-size: 0.78rem;
      background: #0d0d0d;
    }
    #editorWrap .cm-scroller { overflow: auto; }
    #editorWrap .cm-content { color: #bbb; }
    #editorWrap .cm-activeLine { background: transparent; }
    #editorWrap .cm-gutters {
      background: #111;
      border-right: 1px solid #1e1e1e;
      color: #444;
    }
    .cm-playLine { box-shadow: inset 3px 0 0 #4c9; }
    .cm-playLine .cm-gutterElement { color: #4c9 !important; font-weight: bold; }

    /* drag divider */
    #hDivider {
      height: 4px;
      background: #1e1e1e;
      border-top: 1px solid #2a2a2a;
      border-bottom: 1px solid #2a2a2a;
      cursor: row-resize;
      flex-shrink: 0;
    }
    #hDivider:hover { background: #2a3a4a; }

    /* console */
    #consolePane {
      height: 140px;
      min-height: 40px;
      max-height: 60vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      border-top: none;
    }
    #log {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 0.4rem 0.6rem;
      font-size: 0.7rem;
      color: #6c9;
      line-height: 1.5;
      background: #0d0d0d;
    }
    #log .err { color: #e55; }
    #log .info { color: #7df; }

    /* ---- right panel ---- */
    #rightPanel {
      width: 400px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: #141414;
      border-left: 1px solid #2a2a2a;
      overflow-y: auto;
      overflow-x: hidden;
      transition: width 0.15s ease;
    }
    #rightPanel.collapsed { width: 0; overflow: hidden; }

    .rack-section {
      border-bottom: 1px solid #222;
      padding: 0.75rem;
    }
    .rack-title {
      font-size: 0.75rem;
      font-weight: bold;
      color: #7df;
      margin-bottom: 0.5rem;
    }

    /* ---- knobs / sliders (right panel) ---- */
    .param-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 0.5rem;
    }
    .knob-wrap { display: flex; flex-direction: column; gap: 0.3rem; margin-bottom: 0.5rem; }
    .knob-wrap:last-child { margin-bottom: 0; }
    .knob-label {
      font-size: 0.62rem;
      color: #999;
      display: flex;
      justify-content: space-between;
    }
    .knob-label span.val { color: #adf; }
    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      height: 3px;
      background: #333;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 11px; height: 11px;
      border-radius: 50%;
      background: #7df;
      border: none;
    }
    input[type=range]:hover { background: #444; }

    .op-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.5rem;
    }
    .op-col-title {
      font-size: 0.62rem;
      color: #7a9;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.4rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .op-col-title input[type=checkbox] {
      accent-color: #7a9;
      width: 0.75rem;
      height: 0.75rem;
      margin: 0;
      padding: 0;
      cursor: pointer;
      flex-shrink: 0;
    }
    #algDisplay {
      font-size: 0.67rem;
      color: #999;
      min-height: 0;
      margin: 0.2rem 0;
    }
    .op-grid { margin-top: 0.3rem; }
    .param-grid { margin-bottom: 0.3rem; }

    /* channel strips */
    .ch-strips-row {
      display: flex;
      gap: 0.3rem;
    }
    .ch-col {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      align-items: stretch;
      flex: 1;
    }
    .ms-btn {
      background: #1e1e1e;
      border: 1px solid #2e2e2e;
      color: #999;
      font-family: inherit;
      font-size: 0.68rem;
      border-radius: 2px;
      cursor: pointer;
      width: 100%;
      text-align: center;
    }
    .ms-btn:hover { border-color: #777; color: #ddd; }
    .ms-btn.muted  { background: #3a1a1a; border-color: #844; color: #e66; }
    .ms-btn.soloed { background: #1a3a1a; border-color: #484; color: #6e6; }
    .ms-btn.ch-sel { background: #12283a; border-color: #7df; color: #7df; }
    .ms-btn:disabled { opacity: 0.25; cursor: default; }
    .ch-section-label {
      font-size: 0.6rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0.4rem 0 0.2rem;
    }

  </style>
</head>
<body>

  <!-- Top bar -->
  <div id="topbar">
    <!-- Examples dropdown -->
    <select id="presetSelect">
      <option value="/examples/ir/demo1-stage-loop.ir.canonical.json">demo1-stage-loop</option>
      <option value="/examples/ir/demo2-event-recovery.ir.canonical.json">demo2-event-recovery</option>
    </select>
    <button class="tb-btn" onclick="browseFile()">Open…</button>
    <input type="file" id="fileInput" accept=".json" style="display:none">
    <span id="fileNameDisplay"></span>

    <div class="sep"></div>

    <!-- Transport status -->
    <span class="play-dot" id="playDot"></span>
    <span id="posDisplay">--:--</span>
    <span id="bpmDisplay">-- BPM</span>

    <div class="sep"></div>

    <!-- Transport buttons -->
    <button id="btnPlay" class="tb-btn" onclick="onPlay()">▶/⏸  <kbd style="font-size:0.65rem;color:#555">⌘↵</kbd></button>
    <button id="btnStop" class="tb-btn" onclick="onStop()">■  <kbd style="font-size:0.65rem;color:#555">⌘.</kbd></button>

    <div class="spacer"></div>

    <!-- Panel toggle -->
    <button id="btnPanel" class="tb-btn" onclick="togglePanel()">Params ◂</button>
  </div>

  <!-- Main area -->
  <div id="main">

    <!-- Left column: editor + draggable divider + console -->
    <div id="leftCol">
      <div id="editorWrap"></div>
      <div id="hDivider"></div>
      <div id="consolePane">
        <div id="log"></div>
      </div>
    </div>

    <!-- Right panel (collapsible) -->
    <div id="rightPanel">

      <!-- Channel mute / solo -->
      <div class="rack-section">
        <div class="rack-title">Channels</div>
        <div id="chStrips"></div>
      </div>

      <!-- Global Parameters -->
      <div class="rack-section">
        <div class="rack-title">Global</div>
        <div class="param-grid" style="grid-template-columns: repeat(4, 1fr)">
          <div class="knob-wrap">
            <div class="knob-label">LFO <span class="val" id="val-lfo">0</span></div>
            <input type="range" id="sl-lfo" min="0" max="8" value="0" oninput="onChParam('LFO_RATE', this)">
          </div>
        </div>
      </div>

      <!-- FM Parameters -->
      <div class="rack-section">
        <div class="rack-title">FM Parameters</div>
        <div class="param-grid" style="grid-template-columns: repeat(4, 1fr)">
          <div class="knob-wrap">
            <div class="knob-label">ALG <span class="val" id="val-alg">0</span></div>
            <input type="range" id="sl-alg" min="0" max="7" value="0" oninput="onChParam('FM_ALG', this)">
          </div>
          <div class="knob-wrap">
            <div class="knob-label">FB <span class="val" id="val-fb">0</span></div>
            <input type="range" id="sl-fb" min="0" max="7" value="0" oninput="onChParam('FM_FB', this)">
          </div>
          <div class="knob-wrap">
            <div class="knob-label">AMS <span class="val" id="val-ams">0</span></div>
            <input type="range" id="sl-ams" min="0" max="3" value="0" oninput="onChParam('FM_AMS', this)">
          </div>
          <div class="knob-wrap">
            <div class="knob-label">FMS <span class="val" id="val-fms">0</span></div>
            <input type="range" id="sl-fms" min="0" max="7" value="0" oninput="onChParam('FM_FMS', this)">
          </div>
        </div>
        <div id="algDisplay"></div>
        <div class="op-grid" id="opGrid"></div>
      </div>

    </div>
  </div>

  <script type="module">
    import { IRPlayer } from './src/ir-player.js';
    import { compileGML } from './src/gml2ir.js';

    // -----------------------------------------------------------------------
    // CodeMirror 6 — loaded from CDN
    // -----------------------------------------------------------------------
    const { EditorView, Decoration, ViewPlugin, lineNumbers } = await import('https://esm.sh/@codemirror/view@6');
    const { EditorState, StateField, StateEffect } = await import('https://esm.sh/@codemirror/state@6');
    const { defaultHighlightStyle, syntaxHighlighting, StreamLanguage } = await import('https://esm.sh/@codemirror/language@6');
    const { oneDarkTheme, oneDarkHighlightStyle } = await import('https://esm.sh/@codemirror/theme-one-dark@6');

    // StateEffect / StateField for playhead line decoration
    const setPlayLine = StateEffect.define();
    const playLineField = StateField.define({
      create: () => Decoration.none,
      update(deco, tr) {
        deco = deco.map(tr.changes);
        for (const e of tr.effects) {
          if (e.is(setPlayLine)) {
            if (e.value < 0) {
              deco = Decoration.none;
            } else {
              try {
                const line = tr.state.doc.line(e.value);
                deco = Decoration.set([
                  Decoration.line({ class: 'cm-playLine' }).range(line.from),
                ]);
              } catch (_) {
                deco = Decoration.none;
              }
            }
          }
        }
        return deco;
      },
      provide: (f) => EditorView.decorations.from(f),
    });

    // GML StreamLanguage for syntax highlighting
    const gmlMode = StreamLanguage.define({
      startState: () => ({}),
      token(stream, _state) {
        if (stream.eatSpace()) return null;
        if (stream.peek() === ';') { stream.skipToEnd(); return 'comment'; }
        if (stream.peek() === '"') {
          stream.next();
          while (!stream.eol()) { if (stream.next() === '"') break; }
          return 'string';
        }
        if (stream.eat('(') || stream.eat(')')) return 'bracket';
        if (stream.match(/^[+-]?\d+(?:\/\d+)?/)) return 'number';
        if (stream.eat(':')) {
          if (stream.match(/^[a-g][#b]?\d/)) return 'string'; // pitch :c4 :gs3 :bb5
          stream.match(/^[a-zA-Z][a-zA-Z0-9#_-]*/);
          return 'atom';
        }
        if (stream.eat('_')) return 'atom';
        if (stream.match(/^[a-zA-Z][a-zA-Z0-9-]*/)) {
          const KW = new Set([
            'score','track','phrase','note','notes','rest','tie','tuplet',
            'loop-begin','loop-end','marker','jump',
            'param-set','param-add','def','defn','true','false',
          ]);
          return KW.has(stream.current()) ? 'keyword' : 'variable';
        }
        stream.next();
        return null;
      },
    });

    const editorView = new EditorView({
      state: EditorState.create({
        doc: '(loading…)',
        extensions: [
          oneDarkTheme,
          syntaxHighlighting(oneDarkHighlightStyle),
          gmlMode,
          playLineField,
          lineNumbers(),
          EditorView.lineWrapping,
          EditorView.updateListener.of((update) => {
            if (update.docChanged) scheduleCompile();
          }),
        ],
      }),
      parent: document.getElementById('editorWrap'),
    });

    // IR preset → GML source URL mapping
    const IR_TO_GML = {
      '/examples/ir/demo1-stage-loop.ir.canonical.json':
        '/examples/source/demo1-stage-loop.gml',
      '/examples/ir/demo2-event-recovery.ir.canonical.json':
        '/examples/source/demo2-event-recovery.gml',
    };

    async function loadGmlSource(irURL) {
      const gmlURL = IR_TO_GML[irURL];
      if (!gmlURL) {
        setEditorDoc('(no GML source mapped for this IR file)');
        document.getElementById('fileNameDisplay').textContent = '';
        return;
      }
      try {
        const res = await fetch(gmlURL);
        if (!res.ok) throw new Error(res.status);
        const src = await res.text();
        _lastFileName = gmlURL.split('/').pop();
        setEditorDoc(src);
        document.getElementById('fileNameDisplay').textContent = _lastFileName;
      } catch (e) {
        setEditorDoc('(failed to load: ' + gmlURL + ')');
      }
    }

    function setEditorDoc(text) {
      editorView.dispatch({
        changes: { from: 0, to: editorView.state.doc.length, insert: text },
        effects: setPlayLine.of(-1),
      });
    }

    function highlightLine(oneBased) {
      editorView.dispatch({ effects: setPlayLine.of(oneBased) });
    }

    // -----------------------------------------------------------------------
    // Live compile (debounced)
    // -----------------------------------------------------------------------
    let _compileTimer = null;
    let _lastGoodIR = null;     // last successfully compiled IR object
    let _lastSourceMap = null;  // source map from last compile
    let _lastFileName = 'untitled.gml';

    function scheduleCompile() {
      clearTimeout(_compileTimer);
      _compileTimer = setTimeout(() => runCompile(), 400);
    }

    function runCompile() {
      const src = editorView.state.doc.toString();
      try {
        const { ir, diagnostics, sourceMap } = compileGML(src, _lastFileName);
        const errors = diagnostics.filter(d => d.severity === 'error');
        if (errors.length > 0) {
          for (const d of errors) {
            log(`[E] ${d.code} ${d.track || 'global'}:${d.line}:${d.column} ${d.message}`, 'err');
          }
          // Keep playing with last good IR — do not hotSwap
          return;
        }
        _lastGoodIR = ir;
        _lastSourceMap = sourceMap;
        if (player) {
          player.hotSwap(ir, () => workletNode?.port.postMessage({ type: 'flush' }));
          log('Recompiled — continuing from bar boundary', 'info');
        }
      } catch (e) {
        log('[compile] ' + e.message, 'err');
      }
    }

    // Wire editor → live compile is registered in EditorState extensions above.

    // Load source for initial preset
    loadGmlSource(document.getElementById('presetSelect').value);

    // -----------------------------------------------------------------------
    // State
    // -----------------------------------------------------------------------
    let audioCtx = null;
    let workletNode = null;
    let player = null;
    let currentIrURL = document.getElementById('presetSelect').value;
    let selectedCh = 0;

    // -----------------------------------------------------------------------
    // Logging / status
    // -----------------------------------------------------------------------
    const logEl = document.getElementById('log');
    function log(msg, cls = '') {
      const d = document.createElement('div');
      if (cls) d.className = cls;
      d.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      logEl.appendChild(d);
      logEl.scrollTop = logEl.scrollHeight;
    }
    function setStatus(_msg, playing = false) {
      document.getElementById('playDot').classList.toggle('playing', playing);
    }

    // -----------------------------------------------------------------------
    // Panel toggle
    // -----------------------------------------------------------------------
    let _panelOpen = true;
    function togglePanel() {
      _panelOpen = !_panelOpen;
      document.getElementById('rightPanel').classList.toggle('collapsed', !_panelOpen);
      document.getElementById('btnPanel').textContent = _panelOpen ? 'Params ◂' : 'Params ▸';
    }
    window.togglePanel = togglePanel;

    // -----------------------------------------------------------------------
    // Channel strips: mute / solo
    // -----------------------------------------------------------------------
    const _muteState = new Array(10).fill(false); // 0-5 FM, 6-9 PSG
    let _soloChannel = -1; // -1 = no solo

    const FM_LABELS  = ['F1','F2','F3','F4','F5','F6'];
    const PSG_LABELS = ['P1','P2','P3','N1'];

    function buildChStrips() {
      const el = document.getElementById('chStrips');
      el.innerHTML = '';

      const row = document.createElement('div');
      row.className = 'ch-strips-row';

      // FM channels
      for (let ch = 0; ch < 6; ch++) {
        const col = document.createElement('div');
        col.className = 'ch-col';
        col.innerHTML = `
          <button class="ms-btn${ch === 0 ? ' ch-sel' : ''}" id="btn-ch-${ch}" onclick="selectCh(${ch})">${FM_LABELS[ch]}</button>
          <button class="ms-btn" id="btn-mute-${ch}" onclick="toggleMute(${ch})" style="margin-top:0.35rem">M</button>
          <button class="ms-btn" id="btn-solo-${ch}" onclick="toggleSolo(${ch})">S</button>
        `;
        row.appendChild(col);
      }

      // PSG channels
      for (let i = 0; i < 4; i++) {
        const ch = 6 + i;
        const col = document.createElement('div');
        col.className = 'ch-col';
        col.innerHTML = `
          <button class="ms-btn" style="cursor:default;color:#444;border-color:#222">${PSG_LABELS[i]}</button>
          <button class="ms-btn" id="btn-mute-${ch}" disabled style="margin-top:0.35rem">M</button>
          <button class="ms-btn" id="btn-solo-${ch}" disabled>S</button>
        `;
        row.appendChild(col);
      }

      el.appendChild(row);
    }
    buildChStrips();

    function toggleMute(ch) {
      _muteState[ch] = !_muteState[ch];
      document.getElementById(`btn-mute-${ch}`).classList.toggle('muted', _muteState[ch]);
      player?.muteChannel(ch, _muteState[ch]);
    }

    function toggleSolo(ch) {
      if (_soloChannel === ch) {
        // unsolo
        _soloChannel = -1;
        for (let i = 0; i < 6; i++) {
          document.getElementById(`btn-solo-${i}`).classList.remove('soloed');
        }
        player?.clearMute();
        // restore explicit mutes
        for (let i = 0; i < 6; i++) {
          if (_muteState[i]) player?.muteChannel(i, true);
        }
      } else {
        _soloChannel = ch;
        for (let i = 0; i < 6; i++) {
          document.getElementById(`btn-solo-${i}`).classList.toggle('soloed', i === ch);
        }
        player?.soloChannel(ch);
      }
    }

    window.toggleMute = toggleMute;
    window.toggleSolo = toggleSolo;

    // -----------------------------------------------------------------------
    // Horizontal divider drag
    // -----------------------------------------------------------------------
    (() => {
      const divider = document.getElementById('hDivider');
      const consolePane = document.getElementById('consolePane');
      let dragging = false, startY = 0, startH = 0;
      divider.addEventListener('mousedown', (e) => {
        dragging = true;
        startY = e.clientY;
        startH = consolePane.offsetHeight;
        document.body.style.userSelect = 'none';
        document.body.style.cursor = 'row-resize';
      });
      document.addEventListener('mousemove', (e) => {
        if (!dragging) return;
        const delta = startY - e.clientY;
        const newH = Math.max(40, Math.min(startH + delta, window.innerHeight * 0.6));
        consolePane.style.height = newH + 'px';
      });
      document.addEventListener('mouseup', () => {
        dragging = false;
        document.body.style.userSelect = '';
        document.body.style.cursor = '';
      });
    })();

    // -----------------------------------------------------------------------
    // Audio
    // -----------------------------------------------------------------------
    function writeToWorklet(port, addr, data, when) {
      workletNode?.port.postMessage({ type: 'write', port, addr, data, when });
    }

    async function initAudio() {
      if (audioCtx) return true;
      try {
        audioCtx = new AudioContext({ sampleRate: 48000 });
        if (audioCtx.state === 'suspended') await audioCtx.resume();
        log('AudioContext @ ' + audioCtx.sampleRate + ' Hz', 'info');
        await audioCtx.audioWorklet.addModule('./worklet.js');
        workletNode = new AudioWorkletNode(audioCtx, 'ym2612-processor', {
          numberOfOutputs: 1,
          outputChannelCount: [2],
        });
        workletNode.connect(audioCtx.destination);
        log('YM2612 worklet ready', 'info');
        return true;
      } catch (e) {
        log('Audio init failed: ' + e.message, 'err');
        return false;
      }
    }

    async function onPlay(fromLine = null) {
      const ok = await initAudio();
      if (!ok) return;
      if (player) player.stop();
      player = new IRPlayer(writeToWorklet);
      try {
        // Use last successfully compiled IR if available, else load from URL
        if (_lastGoodIR) {
          player.loadJSON(_lastGoodIR);
          log('Playing (compiled source)', 'info');
        } else {
          log('Loading ' + currentIrURL + '…');
          await player.loadURL(currentIrURL);
          log('Playing', 'info');
        }
        player.setOnLine(highlightLine);
        player.setOnTick((tick, bpm, ppqn) => {
          const beat = Math.floor(tick / ppqn);
          const bar = Math.floor(beat / 4) + 1;
          const beatInBar = (beat % 4) + 1;
          document.getElementById('posDisplay').textContent = bar + ' : ' + beatInBar;
          document.getElementById('bpmDisplay').textContent = bpm + ' BPM';
        });
        const PARAM_KEY_MAP = { TL: 'tl', AR: 'ar', DR: 'dr', SL: 'sl', SR: 'd2r', RR: 'rr', ML: 'mul', DT: 'dt', KS: 'rs', SSG: 'ssg' };
        player.setOnParam((ch, target, value) => {
          if (ch !== selectedCh) return;
          if (target === 'FM_ALG') {
            setSlider('sl-alg', 'val-alg', value);
            document.getElementById('algDisplay').textContent = ALG_DESC[value] ?? '';
          } else if (target === 'FM_FB') {
            setSlider('sl-fb', 'val-fb', value);
          } else if (target === 'LFO_RATE') {
            setSlider('sl-lfo', 'val-lfo', value);
          } else if (target === 'FM_AMS') {
            setSlider('sl-ams', 'val-ams', value);
          } else if (target === 'FM_FMS') {
            setSlider('sl-fms', 'val-fms', value);
          } else {
            const m = target.match(/^FM_(TL|AR|DR|SL|SR|RR|ML|DT|KS|SSG)(\d)$/);
            if (m) {
              const key = PARAM_KEY_MAP[m[1]];
              setSlider(`sl-op${m[2]}-${key}`, `val-op${m[2]}-${key}`, value);
            }
          }
        });
        // Seek to cursor line if provided and source map available
        if (fromLine != null && _lastSourceMap) {
          player.playFromLine(audioCtx, fromLine, _lastSourceMap);
        } else {
          player.play(audioCtx);
        }
        setStatus('Playing', true);
        document.getElementById('btnPlay').classList.add('active');
        document.getElementById('btnStop').disabled = false;
        // Restore mute/solo state on new player instance
        if (_soloChannel >= 0) {
          player.soloChannel(_soloChannel);
        } else {
          for (let i = 0; i < 6; i++) {
            if (_muteState[i]) player.muteChannel(i, true);
          }
        }
        syncParamUI();
      } catch (e) {
        log('Error: ' + e.message, 'err');
        setStatus('Error');
      }
    }

    function onStop() {
      player?.stop();
      player = null;
      log('Stopped');
      setStatus('Stopped', false);
      document.getElementById('btnPlay').classList.remove('active');
      document.getElementById('posDisplay').textContent = '--:--';
      document.getElementById('bpmDisplay').textContent = '-- BPM';
      editorView.dispatch({ effects: setPlayLine.of(-1) });
    }

    // -----------------------------------------------------------------------
    // File picker
    // -----------------------------------------------------------------------
    function browseFile() { document.getElementById('fileInput').click(); }
    document.getElementById('fileInput').addEventListener('change', (e) => {
      const f = e.target.files[0];
      if (!f) return;
      const url = URL.createObjectURL(f);
      const opt = new Option(f.name, url, true, true);
      document.getElementById('presetSelect').append(opt);
      currentIrURL = url;
      _lastGoodIR = null; // force reload from new source after compile
      onStop();
      log('File: ' + f.name);
    });
    document.getElementById('presetSelect').addEventListener('change', (e) => {
      currentIrURL = e.target.value;
      _lastGoodIR = null;
      onStop();
      loadGmlSource(currentIrURL);
    });

    // btnPlay is always enabled (audio init on first click)
    document.getElementById('btnStop').disabled = false;

    // -----------------------------------------------------------------------
    // Keyboard shortcuts: Cmd+Enter = play/pause toggle, Cmd+. = full stop
    // -----------------------------------------------------------------------
    let _paused = false;
    let _pausedTick = 0;

    function onPause() {
      if (!player || !player.isPlaying()) return;
      _pausedTick = player.currentTick();
      player.stop();
      _paused = true;
      log('Paused');
      document.getElementById('btnPlay').classList.remove('active');
    }

    function onResume() {
      if (!player || !_paused) return;
      player.playFromTick(audioCtx, _pausedTick);
      _paused = false;
      log('Resumed', 'info');
      document.getElementById('btnPlay').classList.add('active');
    }

    document.addEventListener('keydown', async (e) => {
      const isMac = navigator.platform.toUpperCase().includes('MAC');
      const mod = isMac ? e.metaKey : e.ctrlKey;
      if (!mod) return;

      if (e.key === 'Enter') {
        e.preventDefault();
        if (!player || (!player.isPlaying() && !_paused)) {
          // Seek to cursor line and play
          const cursorLine = editorView.state.doc.lineAt(editorView.state.selection.main.head).number;
          await onPlay(cursorLine);
        } else if (_paused) {
          onResume();
        } else {
          onPause();
        }
      } else if (e.key === '.') {
        e.preventDefault();
        _paused = false;
        _pausedTick = 0;
        onStop();
      }
    });

    // Expose for inline handlers
    window.onPlay = onPlay;
    window.onStop = onStop;
    window.browseFile = browseFile;

    // -----------------------------------------------------------------------
    // Parameter UI
    // -----------------------------------------------------------------------

    // Algorithm descriptions (what's a carrier, what's a modulator)
    const ALG_DESC = [
      'Alg 0: 1→2→3→4  (max modulation)',
      'Alg 1: (1+2)→3→4',
      'Alg 2: (1+(2→3))→4',
      'Alg 3: ((1→2)+3)→4',
      'Alg 4: (1→2)+(3→4)  (2 carriers)',
      'Alg 5: 1→(2+3+4)  (3 carriers)',
      'Alg 6: (1→2)+3+4  (3 carriers)',
      'Alg 7: 1+2+3+4  (all carriers, pure additive)',
    ];

    // Build channel tabs — now handled by F1-F6 buttons in chStrips
    function selectCh(ch) {
      selectedCh = ch;
      for (let i = 0; i < 6; i++) {
        document.getElementById(`btn-ch-${i}`)?.classList.toggle('ch-sel', i === ch);
      }
      syncParamUI();
    }

    // Build operator grids
    const OP_PARAMS = [
      { key: 'tl',  label: 'TL',  min: 0, max: 127, param: (op) => `FM_TL${op}` },
      { key: 'ar',  label: 'AR',  min: 0, max: 31,  param: (op) => `FM_AR${op}` },
      { key: 'dr',  label: 'DR',  min: 0, max: 31,  param: (op) => `FM_DR${op}` },
      { key: 'sl',  label: 'SL',  min: 0, max: 15,  param: (op) => `FM_SL${op}` },
      { key: 'd2r', label: 'SR',  min: 0, max: 31,  param: (op) => `FM_SR${op}` },
      { key: 'rr',  label: 'RR',  min: 0, max: 15,  param: (op) => `FM_RR${op}` },
      { key: 'mul', label: 'MUL', min: 0, max: 15,  param: (op) => `FM_ML${op}` },
      { key: 'dt',  label: 'DT',  min: 0, max: 7,   param: (op) => `FM_DT${op}` },
      { key: 'rs',  label: 'KS',  min: 0, max: 3,   param: (op) => `FM_KS${op}` },
      { key: 'ssg', label: 'SSG', min: 0, max: 15,  param: (op) => `FM_SSG${op}` },
    ];

    const opGridEl = document.getElementById('opGrid');
    for (let op = 1; op <= 4; op++) {
      const col = document.createElement('div');
      col.className = 'op-col';
      // bit position in opMask: op1=bit4(0x10), op2=bit5(0x20), op3=bit6(0x40), op4=bit7(0x80)
      const opBit = 1 << (op + 3);
      col.innerHTML = `<div class="op-col-title">
        <input type="checkbox" id="chk-op${op}" checked
          onchange="onOpToggle(${op}, this.checked)">
        <label for="chk-op${op}">OP${op}</label>
        <input type="checkbox" id="chk-amen${op}"
          onchange="onAmenToggle(${op}, this.checked)">
        <label for="chk-amen${op}" style="color:#fa9">AM</label>
      </div>`;

      for (const pp of OP_PARAMS) {
        const wrap = document.createElement('div');
        wrap.className = 'knob-wrap';
        const labelId = `val-op${op}-${pp.key}`;
        const sliderId = `sl-op${op}-${pp.key}`;
        wrap.innerHTML = `
          <div class="knob-label">${pp.label} <span class="val" id="${labelId}">-</span></div>
          <input type="range" id="${sliderId}" min="${pp.min}" max="${pp.max}" value="${pp.min}"
            data-param="${pp.param(op)}" data-val-id="${labelId}"
            oninput="onOpParam(this)">
        `;
        col.appendChild(wrap);
      }
      opGridEl.appendChild(col);
    }

    // ---- sync slider display from player state ----
    function syncParamUI() {
      if (!player) return;
      const regs = player.getChRegs(selectedCh);

      // Channel level
      setSlider('sl-alg', 'val-alg', regs.algorithm);
      setSlider('sl-fb',  'val-fb',  regs.feedback);
      setSlider('sl-lfo', 'val-lfo', regs.lfoRate ?? 0);
      setSlider('sl-ams', 'val-ams', regs.ams ?? 0);
      setSlider('sl-fms', 'val-fms', regs.fms ?? 0);
      document.getElementById('algDisplay').textContent = ALG_DESC[regs.algorithm] ?? '';

      // Per-operator ON/OFF
      const mask = player ? player.getOpMask(selectedCh) : 0xf0;
      for (let op = 1; op <= 4; op++) {
        const bit = 1 << (op + 3);
        const chk = document.getElementById(`chk-op${op}`);
        if (chk) chk.checked = !!(mask & bit);
        const amenChk = document.getElementById(`chk-amen${op}`);
        if (amenChk) amenChk.checked = !!(regs.ops[op - 1].amen);
      }

      // Per-operator params
      for (let op = 1; op <= 4; op++) {
        const o = regs.ops[op - 1];
        setSlider(`sl-op${op}-tl`,  `val-op${op}-tl`,  o.tl);
        setSlider(`sl-op${op}-ar`,  `val-op${op}-ar`,  o.ar);
        setSlider(`sl-op${op}-dr`,  `val-op${op}-dr`,  o.dr);
        setSlider(`sl-op${op}-sl`,  `val-op${op}-sl`,  o.sl);
        setSlider(`sl-op${op}-d2r`, `val-op${op}-d2r`, o.d2r);
        setSlider(`sl-op${op}-rr`,  `val-op${op}-rr`,  o.rr);
        setSlider(`sl-op${op}-mul`, `val-op${op}-mul`, o.mul);
        setSlider(`sl-op${op}-dt`,  `val-op${op}-dt`,  o.dt);
        setSlider(`sl-op${op}-rs`,  `val-op${op}-rs`,  o.rs);
        setSlider(`sl-op${op}-ssg`, `val-op${op}-ssg`, o.ssg);
      }
    }

    function setSlider(sliderId, valId, value) {
      const sl = document.getElementById(sliderId);
      const vl = document.getElementById(valId);
      if (sl) sl.value = value;
      if (vl) vl.textContent = value;
    }

    // ---- slider change handlers ----
    window.onChParam = function(paramName, slider) {
      const val = parseInt(slider.value, 10);
      const valEl = document.getElementById(slider.id.replace('sl-', 'val-'));
      if (valEl) valEl.textContent = val;

      if (paramName === 'FM_ALG') {
        document.getElementById('algDisplay').textContent = ALG_DESC[val] ?? '';
      }

      if (player) {
        player.setParam(paramName, val, selectedCh);
      } else if (workletNode) {
        initParamOnlyPlayer();
        player.setParam(paramName, val, selectedCh);
      }
    };

    window.onAmenToggle = function(op, checked) {
      if (!player) {
        initParamOnlyPlayer();
      }
      player.setParam(`FM_AMEN${op}`, checked ? 1 : 0, selectedCh);
      const amenChk = document.getElementById(`chk-amen${op}`);
      if (amenChk) amenChk.checked = checked;
    };

    window.onOpToggle = function(op, checked) {
      if (!player) return;
      // op1=bit4, op2=bit5, op3=bit6, op4=bit7
      const bit = 1 << (op + 3);
      const cur = player.getOpMask(selectedCh);
      const next = checked ? (cur | bit) : (cur & ~bit);
      player.setOpMask(selectedCh, next);
    };

    window.onOpParam = function(slider) {
      const paramName = slider.dataset.param;
      const val = parseInt(slider.value, 10);
      const valEl = document.getElementById(slider.dataset.valId);
      if (valEl) valEl.textContent = val;

      if (player) {
        player.setParam(paramName, val, selectedCh);
      } else {
        initParamOnlyPlayer();
        player.setParam(paramName, val, selectedCh);
      }
    };

    function initParamOnlyPlayer() {
      if (player) return;
      if (!workletNode) return;
      player = new IRPlayer(writeToWorklet);
      player.loadJSON({ ppqn: 120, tracks: [] });
      player._initDefaultVoices();
      syncParamUI();
    }

    log('Ready.', 'info');
  </script>
</body>
